name: Fuzz Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'

# Declare minimal permissions at workflow level
permissions: {}

jobs:
  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz tests
        run: |
          # Determine fuzz duration based on event type
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FUZZ_TIME="5m"
          else
            FUZZ_TIME="30s"
          fi
          echo "Fuzz duration: ${FUZZ_TIME}"

          # Run fuzz tests - each test runs for the specified duration
          go test -fuzz=FuzzParseDecryptedYAML -fuzztime="${FUZZ_TIME}" ./pkg/sops/ -v
          go test -fuzz=FuzzValidateEncryptedYAML -fuzztime="${FUZZ_TIME}" ./pkg/sops/ -v

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: '**/testdata/fuzz/**'
          retention-days: 30
          if-no-files-found: ignore
